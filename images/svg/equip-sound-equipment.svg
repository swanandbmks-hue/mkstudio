<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="400" height="400">
  <defs>
    <radialGradient id="eq_bg_sound-equipment" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#00C7BE;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00C7BE;stop-opacity:0.02"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" rx="20" fill="#F8F8FC"/>
  <rect width="300" height="300" rx="20" fill="url(#eq_bg_sound-equipment)"/>
  <!-- subtle grid -->
  <pattern id="g_sound-equipment" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00C7BE" stroke-width="0.3" opacity="0.3"/>
  </pattern>
  <rect width="300" height="300" rx="20" fill="url(#g_sound-equipment)"/>
  
    <!-- Boom mic body -->
    <rect x="90" y="50" width="120" height="180" rx="60" fill="#1D1D1F"/>
    <rect x="92" y="52" width="116" height="176" rx="59" fill="none" stroke="#00C7BE" stroke-width="1.5" opacity="0.3"/>
    <!-- Mesh pattern -->
    <line x1="120" y1="80" x2="120" y2="200" stroke="#00C7BE" stroke-width="1" opacity="0.2"/>
    <line x1="140" y1="70" x2="140" y2="210" stroke="#00C7BE" stroke-width="1" opacity="0.2"/>
    <line x1="160" y1="70" x2="160" y2="210" stroke="#00C7BE" stroke-width="1" opacity="0.2"/>
    <line x1="180" y1="80" x2="180" y2="200" stroke="#00C7BE" stroke-width="1" opacity="0.2"/>
    <line x1="95" y1="100" x2="205" y2="100" stroke="#00C7BE" stroke-width="1" opacity="0.2"/>
    <line x1="90" y1="120" x2="210" y2="120" stroke="#00C7BE" stroke-width="1" opacity="0.2"/>
    <line x1="90" y1="140" x2="210" y2="140" stroke="#00C7BE" stroke-width="1" opacity="0.2"/>
    <line x1="90" y1="160" x2="210" y2="160" stroke="#00C7BE" stroke-width="1" opacity="0.2"/>
    <line x1="95" y1="180" x2="205" y2="180" stroke="#00C7BE" stroke-width="1" opacity="0.2"/>
    <!-- Diaphragm center -->
    <circle cx="150" cy="140" r="30" fill="none" stroke="#00C7BE" stroke-width="2" opacity="0.5"/>
    <circle cx="150" cy="140" r="15" fill="#00C7BE" opacity="0.2"/>
    <circle cx="150" cy="140" r="7" fill="#00C7BE" opacity="0.5"/>
    <!-- XLR connector -->
    <rect x="135" y="228" width="30" height="25" rx="6" fill="#2C2C2E"/>
    <circle cx="144" cy="241" r="3" fill="#00C7BE"/>
    <circle cx="156" cy="241" r="3" fill="#00C7BE"/>
    <circle cx="150" cy="234" r="3" fill="#00C7BE"/>
  
</svg>