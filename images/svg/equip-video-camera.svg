<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="400" height="400">
  <defs>
    <radialGradient id="eq_bg_video-camera" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#0071E3;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#0071E3;stop-opacity:0.02"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" rx="20" fill="#F8F8FC"/>
  <rect width="300" height="300" rx="20" fill="url(#eq_bg_video-camera)"/>
  <!-- subtle grid -->
  <pattern id="g_video-camera" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#0071E3" stroke-width="0.3" opacity="0.3"/>
  </pattern>
  <rect width="300" height="300" rx="20" fill="url(#g_video-camera)"/>
  
    <!-- Camera body -->
    <rect x="60" y="80" width="180" height="120" rx="12" fill="#1D1D1F"/>
    <rect x="62" y="82" width="176" height="116" rx="11" fill="none" stroke="#0071E3" stroke-width="1.5" opacity="0.3"/>
    <!-- Lens -->
    <circle cx="150" cy="140" r="45" fill="#0A0A0A"/>
    <circle cx="150" cy="140" r="38" fill="#111"/>
    <circle cx="150" cy="140" r="28" fill="#0071E3" opacity="0.2"/>
    <circle cx="150" cy="140" r="20" fill="#0071E3" opacity="0.4"/>
    <circle cx="150" cy="140" r="10" fill="#0071E3"/>
    <circle cx="140" cy="130" r="5" fill="white" opacity="0.3"/>
    <!-- Viewfinder -->
    <rect x="240" y="90" width="50" height="35" rx="4" fill="#111"/>
    <rect x="244" y="94" width="42" height="27" rx="2" fill="#0071E3" opacity="0.3"/>
    <!-- Grip -->
    <rect x="70" y="200" width="60" height="50" rx="8" fill="#2C2C2E"/>
    <!-- Controls -->
    <circle cx="220" cy="100" r="8" fill="#333"/>
    <circle cx="220" cy="100" r="4" fill="#0071E3"/>
    <rect x="200" y="115" width="30" height="6" rx="3" fill="#333"/>
    <!-- Record button -->
    <circle cx="75" cy="95" r="8" fill="#FF3B30"/>
    <!-- Label -->
    <text x="150" y="175" text-anchor="middle" font-family="system-ui" font-size="11" fill="#86868B" letter-spacing="2">CINEMA</text>
  
</svg>