<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="400" height="400">
  <defs>
    <radialGradient id="eq_bg_gopro" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#FF6F00;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#FF6F00;stop-opacity:0.02"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" rx="20" fill="#F8F8FC"/>
  <rect width="300" height="300" rx="20" fill="url(#eq_bg_gopro)"/>
  <!-- subtle grid -->
  <pattern id="g_gopro" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#FF6F00" stroke-width="0.3" opacity="0.3"/>
  </pattern>
  <rect width="300" height="300" rx="20" fill="url(#g_gopro)"/>
  
    <!-- GoPro body -->
    <rect x="90" y="80" width="120" height="100" rx="16" fill="#1D1D1F"/>
    <rect x="92" y="82" width="116" height="96" rx="15" fill="none" stroke="#FF6F00" stroke-width="2" opacity="0.4"/>
    <!-- Screen -->
    <rect x="100" y="90" width="100" height="65" rx="8" fill="#0A0A0A"/>
    <rect x="104" y="94" width="92" height="57" rx="6" fill="#1a0800"/>
    <!-- Screen content -->
    <text x="150" y="118" text-anchor="middle" font-family="monospace" font-size="9" fill="#FF6F00">4K</text>
    <text x="150" y="132" text-anchor="middle" font-family="monospace" font-size="7" fill="#FF6F00" opacity="0.7">60fps</text>
    <!-- Lens -->
    <rect x="108" y="162" width="84" height="24" rx="4" fill="#111"/>
    <circle cx="150" cy="174" r="10" fill="#0A0A0A"/>
    <circle cx="150" cy="174" r="7" fill="#FF6F00" opacity="0.5"/>
    <circle cx="150" cy="174" r="4" fill="#FF6F00"/>
    <!-- Buttons -->
    <rect x="90" y="100" width="8" height="20" rx="4" fill="#FF6F00"/>
    <circle cx="205" cy="95" r="6" fill="#FF6F00"/>
    <!-- Mount -->
    <rect x="110" y="180" width="80" height="15" rx="3" fill="#2C2C2E"/>
  
</svg>