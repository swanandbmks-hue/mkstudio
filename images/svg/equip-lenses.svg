<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="400" height="400">
  <defs>
    <radialGradient id="eq_bg_lenses" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#AF52DE;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#AF52DE;stop-opacity:0.02"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" rx="20" fill="#F8F8FC"/>
  <rect width="300" height="300" rx="20" fill="url(#eq_bg_lenses)"/>
  <!-- subtle grid -->
  <pattern id="g_lenses" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#AF52DE" stroke-width="0.3" opacity="0.3"/>
  </pattern>
  <rect width="300" height="300" rx="20" fill="url(#g_lenses)"/>
  
    <!-- Main lens body -->
    <rect x="80" y="60" width="140" height="160" rx="20" fill="#1D1D1F"/>
    <!-- Lens rings -->
    <ellipse cx="150" cy="80" rx="68" ry="12" fill="#2C2C2E"/>
    <ellipse cx="150" cy="220" rx="68" ry="12" fill="#2C2C2E"/>
    <!-- Focus ring -->
    <rect x="82" y="110" width="136" height="40" rx="0" fill="#2C2C2E"/>
    <!-- Ring markings -->
    <line x1="100" y1="110" x2="100" y2="150" stroke="#AF52DE" stroke-width="1" opacity="0.4"/>
    <line x1="120" y1="110" x2="120" y2="150" stroke="#AF52DE" stroke-width="1" opacity="0.4"/>
    <line x1="140" y1="110" x2="140" y2="150" stroke="#AF52DE" stroke-width="1" opacity="0.4"/>
    <line x1="160" y1="110" x2="160" y2="150" stroke="#AF52DE" stroke-width="1" opacity="0.4"/>
    <line x1="180" y1="110" x2="180" y2="150" stroke="#AF52DE" stroke-width="1" opacity="0.4"/>
    <line x1="200" y1="110" x2="200" y2="150" stroke="#AF52DE" stroke-width="1" opacity="0.4"/>
    <!-- Front element -->
    <circle cx="150" cy="140" r="55" fill="#0A0A0A"/>
    <circle cx="150" cy="140" r="45" fill="#111"/>
    <circle cx="150" cy="140" r="32" fill="#AF52DE" opacity="0.15"/>
    <circle cx="150" cy="140" r="22" fill="#AF52DE" opacity="0.25"/>
    <circle cx="150" cy="140" r="12" fill="#AF52DE" opacity="0.5"/>
    <circle cx="136" cy="126" r="8" fill="white" opacity="0.12"/>
    <!-- Aperture blades hint -->
    <circle cx="150" cy="140" r="50" fill="none" stroke="#AF52DE" stroke-width="1" opacity="0.2"/>
  
</svg>