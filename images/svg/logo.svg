  <line x1="185" y1="16" x2="185" y2="44" stroke="url(#logo_g)" stroke-width="1" opacity="0.4"/>
  <line x1="171" y1="30" x2="199" y2="30" stroke="url(#logo_g)" stroke-width="1" opacity="0.4"/>
