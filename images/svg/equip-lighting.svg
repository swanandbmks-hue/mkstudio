<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="400" height="400">
  <defs>
    <radialGradient id="eq_bg_lighting" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#FF9F0A;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#FF9F0A;stop-opacity:0.02"/>
    </radialGradient>
  </defs>
  <rect width="300" height="300" rx="20" fill="#F8F8FC"/>
  <rect width="300" height="300" rx="20" fill="url(#eq_bg_lighting)"/>
  <!-- subtle grid -->
  <pattern id="g_lighting" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#FF9F0A" stroke-width="0.3" opacity="0.3"/>
  </pattern>
  <rect width="300" height="300" rx="20" fill="url(#g_lighting)"/>
  
    <!-- LED panel body -->
    <rect x="60" y="70" width="180" height="130" rx="8" fill="#1D1D1F"/>
    <rect x="68" y="78" width="164" height="114" rx="5" fill="#111"/>
    <!-- LED grid -->
    {"".join([f'<circle cx="{86+i*20}" cy="{95+j*20}" r="5" fill="#FF9F0A" opacity="{0.4+0.1*(i+j)%4}"/>' for i in range(8) for j in range(5)])}
    <!-- Bright center glow -->
    <radialGradient id="ledglow" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FF9F0A;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FF9F0A;stop-opacity:0"/>
    </radialGradient>
    <rect x="68" y="78" width="164" height="114" rx="5" fill="url(#ledglow)"/>
    <!-- Mount arm -->
    <rect x="143" y="200" width="14" height="50" rx="4" fill="#2C2C2E"/>
    <rect x="120" y="240" width="60" height="10" rx="5" fill="#333"/>
    <!-- Control knob -->
    <circle cx="226" cy="90" r="10" fill="#2C2C2E"/>
    <circle cx="226" cy="90" r="6" fill="#FF9F0A" opacity="0.5"/>
    <!-- Color temp strip -->
    <rect x="68" y="185" width="164" height="7" rx="0" fill="none"/>
    <rect x="68" y="185" width="82" height="7" fill="#FF9F0A" opacity="0.6"/>
    <rect x="150" y="185" width="82" height="7" fill="#E0F0FF" opacity="0.6"/>
  
</svg>