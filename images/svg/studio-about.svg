<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" width="600" height="700">
  <defs>
    <linearGradient id="studio_bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0F0F8"/>
      <stop offset="100%" style="stop-color:#E0E4F0"/>
    </linearGradient>
    <radialGradient id="studio_glow" cx="50%" cy="40%">
      <stop offset="0%" style="stop-color:#0071E3;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0071E3;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="700" rx="24" fill="url(#studio_bg)"/>
  <rect width="600" height="700" rx="24" fill="url(#studio_glow)"/>
  <!-- Studio floor perspective -->
  <path d="M50 700 L300 400 L550 700 Z" fill="#E8EAF0" opacity="0.5"/>
  <!-- Back wall -->
  <rect x="80" y="180" width="440" height="300" rx="4" fill="#DDDDE8"/>
  <!-- Camera on tripod -->
  <line x1="300" y1="350" x2="250" y2="480" stroke="#1D1D1F" stroke-width="8" stroke-linecap="round"/>
  <line x1="300" y1="350" x2="350" y2="480" stroke="#1D1D1F" stroke-width="8" stroke-linecap="round"/>
  <line x1="300" y1="350" x2="300" y2="490" stroke="#1D1D1F" stroke-width="8" stroke-linecap="round"/>
  <ellipse cx="250" cy="482" rx="20" ry="6" fill="#333"/>
  <ellipse cx="350" cy="482" rx="20" ry="6" fill="#333"/>
  <ellipse cx="300" cy="492" rx="20" ry="6" fill="#333"/>
  <!-- Camera head -->
  <rect x="268" y="300" width="64" height="50" rx="8" fill="#1D1D1F"/>
  <circle cx="300" cy="325" r="20" fill="#0A0A0A"/>
  <circle cx="300" cy="325" r="14" fill="#0071E3" opacity="0.4"/>
  <circle cx="300" cy="325" r="8" fill="#0071E3"/>
  <!-- Lights left -->
  <line x1="120" y1="180" x2="120" y2="120" stroke="#2C2C2E" stroke-width="6"/>
  <rect x="90" y="90" width="60" height="40" rx="4" fill="#1D1D1F"/>
  <rect x="94" y="94" width="52" height="32" rx="2" fill="#FF9F0A" opacity="0.4"/>
  <!-- Lights right -->
  <line x1="480" y1="180" x2="480" y2="120" stroke="#2C2C2E" stroke-width="6"/>
  <rect x="450" y="90" width="60" height="40" rx="4" fill="#1D1D1F"/>
  <rect x="454" y="94" width="52" height="32" rx="2" fill="#FF9F0A" opacity="0.4"/>
  <!-- Acoustic panels on wall -->
  <rect x="100" y="200" width="80" height="120" rx="4" fill="#C8C8D4"/>
  <rect x="104" y="204" width="72" height="112" rx="2" fill="none" stroke="#B0B0C0" stroke-width="1"/>
  <rect x="420" y="200" width="80" height="120" rx="4" fill="#C8C8D4"/>
  <rect x="424" y="204" width="72" height="112" rx="2" fill="none" stroke="#B0B0C0" stroke-width="1"/>
  <!-- MK STUDIO text on wall -->
  <text x="300" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#86868B" letter-spacing="8" font-weight="700">MK STUDIO</text>
  <!-- Badge overlay -->
  <rect x="170" y="580" width="260" height="80" rx="16" fill="white" opacity="0.9"/>
  <text x="300" y="610" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#0071E3" letter-spacing="4" font-weight="700">EST. 2008</text>
  <text x="300" y="635" text-anchor="middle" font-family="system-ui,sans-serif" font-size="22" fill="#1D1D1F" letter-spacing="-0.5" font-weight="800">PUNE, INDIA</text>
</svg>