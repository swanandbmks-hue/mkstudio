<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F8F8FC"/>
      <stop offset="100%" style="stop-color:#EDF0F8"/>
    </linearGradient>
    <linearGradient id="blue1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0071E3;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00C7BE;stop-opacity:0.06"/>
    </linearGradient>
    <radialGradient id="glow1" cx="70%" cy="30%">
      <stop offset="0%" style="stop-color:#0071E3;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#0071E3;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="70%">
      <stop offset="0%" style="stop-color:#00C7BE;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#00C7BE;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur1"><feGaussianBlur stdDeviation="40"/></filter>
  </defs>
  <rect width="1440" height="900" fill="url(#bg)"/>
  <ellipse cx="1100" cy="250" rx="500" ry="400" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="200" cy="700" rx="400" ry="300" fill="url(#glow2)" filter="url(#blur1)"/>
  <!-- Film strip top -->
  <rect x="0" y="0" width="1440" height="6" fill="#0071E3" opacity="0.08"/>
  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1.2" fill="#0071E3" opacity="0.12"/>
  </pattern>
  <rect width="1440" height="900" fill="url(#dots)"/>
  <!-- Decorative circles -->
  <circle cx="1300" cy="150" r="180" fill="none" stroke="#0071E3" stroke-width="1" opacity="0.08"/>
  <circle cx="1300" cy="150" r="120" fill="none" stroke="#0071E3" stroke-width="1" opacity="0.06"/>
  <circle cx="140" cy="780" r="120" fill="none" stroke="#00C7BE" stroke-width="1" opacity="0.1"/>
  <!-- Camera aperture graphic -->
  <g transform="translate(1180,120) scale(0.7)" opacity="0.06">
    <circle cx="0" cy="0" r="160" fill="none" stroke="#0071E3" stroke-width="3"/>
    <circle cx="0" cy="0" r="100" fill="#0071E3"/>
    <circle cx="0" cy="0" r="40" fill="#F8F8FC"/>
    <line x1="-160" y1="0" x2="160" y2="0" stroke="#0071E3" stroke-width="2"/>
    <line x1="0" y1="-160" x2="0" y2="160" stroke="#0071E3" stroke-width="2"/>
    <line x1="-113" y1="-113" x2="113" y2="113" stroke="#0071E3" stroke-width="2"/>
    <line x1="113" y1="-113" x2="-113" y2="113" stroke="#0071E3" stroke-width="2"/>
  </g>
  <!-- Film reel bottom left -->
  <g transform="translate(80,820) scale(0.5)" opacity="0.07">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#1D1D1F" stroke-width="4"/>
    <circle cx="0" cy="0" r="20" fill="#1D1D1F"/>
    <circle cx="0" cy="-60" r="12" fill="#1D1D1F"/>
    <circle cx="52" cy="-30" r="12" fill="#1D1D1F"/>
    <circle cx="52" cy="30" r="12" fill="#1D1D1F"/>
    <circle cx="0" cy="60" r="12" fill="#1D1D1F"/>
    <circle cx="-52" cy="30" r="12" fill="#1D1D1F"/>
    <circle cx="-52" cy="-30" r="12" fill="#1D1D1F"/>
  </g>
</svg>